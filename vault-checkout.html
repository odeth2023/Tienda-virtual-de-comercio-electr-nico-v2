<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAULT — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-bg-app text-cream font-body antialiased">

  <header></header>

  <div id="checkoutContent"></div>

  <!-- Processing overlay -->
  <div class="fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center gap-6 opacity-0 pointer-events-none transition-opacity duration-300" id="processingOverlay">
    <div class="w-12 h-12 border-4 border-border-custom border-t-gold rounded-full animate-spin-custom" id="procRing"></div>
    <div class="text-center">
      <div class="font-display text-2xl font-medium text-cream" id="procTitle">Procesando pago</div>
      <div class="text-xs text-muted-custom tracking-wider mt-1" id="procSub">No cierres esta ventana</div>
    </div>
    <div class="flex flex-col gap-3 mt-4 text-xs w-full max-w-[240px]" id="procSteps">
      <div class="flex items-center gap-3 text-muted-custom transition-colors duration-300 proc-step" id="ps1">
        <div class="w-2 h-2 rounded-full bg-border-custom transition-all duration-300 dot"></div>
        Verificando datos
      </div>
      <div class="flex items-center gap-3 text-muted-custom transition-colors duration-300 proc-step" id="ps2">
        <div class="w-2 h-2 rounded-full bg-border-custom transition-all duration-300 dot"></div>
        Conectando con el banco
      </div>
      <div class="flex items-center gap-3 text-muted-custom transition-colors duration-300 proc-step" id="ps3">
        <div class="w-2 h-2 rounded-full bg-border-custom transition-all duration-300 dot"></div>
        Autorizando cargo
      </div>
      <div class="flex items-center gap-3 text-muted-custom transition-colors duration-300 proc-step" id="ps4">
        <div class="w-2 h-2 rounded-full bg-border-custom transition-all duration-300 dot"></div>
        Confirmando orden
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/vault-checkout.js"></script>
</body>
</html>
